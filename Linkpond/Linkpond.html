<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(120% 90% at 50% -10%, #2A2723 0%, #1B1A18 60%, #131211 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 18px 16px;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; display: flex; justify-content: center; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #746F65; }
  @keyframes lp-shimmer { 0% { background-position: -200px 0; } 100% { background-position: 340px 0; } }
  @keyframes lp-spin { to { transform: rotate(360deg); } }
</style>
</head>
